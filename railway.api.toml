# railway.api.toml — FastAPI 웹 서버 전용 설정
# skillful-unity 서비스에서 이 파일을 Config File로 지정하세요

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# startCommand, cronSchedule 없음 → Dockerfile CMD 사용
# CMD: uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
